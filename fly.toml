# fly.toml app configuration for zalotg
# Deploy from web: fly.io → New App → GitHub → khuchinque-app/zalotg-deploy

app = "zalotg"
primary_region = "sin"  # Singapore - closest to Zalo's servers

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
